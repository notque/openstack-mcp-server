metadata:
  url: https://github.com/notque/openstack-mcp-server

binaries:
  - name: openstack-mcp-server
    fromPackage: ./cmd/openstack-mcp-server
    installTo: bin/

golang:
  enableVendoring: false
  setGoModVersion: true
  ldflags: |
    -X main.version={{.Version}}

golangciLint:
  createConfig: true

githubWorkflow:
  global:
    defaultBranch: main
  ci:
    enabled: true
    runOn:
      - ubuntu-latest
